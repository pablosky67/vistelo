<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Vestir al Capibara 🌌✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: linear-gradient(135deg, #0f0c20 0%, #06040a 100%);
            --primary: #bf55ec;
            --primary-glow: rgba(191, 85, 236, 0.4);
            --card-bg: rgba(20, 16, 35, 0.7);
            --text-main: #f3f0ff;
            --text-muted: #a29bfe;
            --border: rgba(191, 85, 236, 0.25);
        }

        body {
            margin: 0;
            padding: 10px;
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            user-select: none;
        }

        /* Título Galáctico */
        .titulo {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(to right, #e8a7ff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 2px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(191, 85, 236, 0.3);
        }

        .subtitulo {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 0 0 15px 0;
        }

        /* Contenedor del Juego Universo */
        .contenedor-juego {
            width: 100%;
            max-width: 360px;
            height: 580px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 32px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(191, 85, 236, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            overflow: hidden;
        }

        /* Fondo de estrellas decorativas */
        .estrellas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 65%;
            background-image: 
                radial-gradient(circle at 20% 30%, #fff 1px, transparent 1px),
                radial-gradient(circle at 75% 15%, #fff 1px, transparent 1px),
                radial-gradient(circle at 85% 60%, rgba(255,255,255,0.7) 1px, transparent 1px),
                radial-gradient(circle at 15% 70%, #fff 1.5px, transparent 1px);
            background-size: 100% 100%;
            opacity: 0.4;
            pointer-events: none;
        }

        /* Escenario del Capibara */
        .area-capibara {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 240px;
            height: 310px;
            z-index: 1;
        }

        .capa-personaje {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .outfit-layer {
            display: none;
        }
        .outfit-layer.active {
            display: block;
        }

        /* Menú e Interfaz Inferior Oscura */
        .closet-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: rgba(14, 11, 26, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .menu-pestanas {
            display: flex;
            background: rgba(191, 85, 236, 0.05);
            border-bottom: 1px solid rgba(191, 85, 236, 0.15);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            padding: 12px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            color: var(--text-muted);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .tab-btn.active {
            color: #ffffff;
            background: rgba(20, 16, 35, 0.5);
            border-bottom: 2px solid var(--primary);
            text-shadow: 0 0 10px var(--primary-glow);
        }

        /* Vitrina / Rejilla de Opciones */
        .vitrina-items {
            flex: 1;
            padding: 10px 15px;
            display: none;
            gap: 15px;
            overflow-x: auto;
            align-items: center;
            box-sizing: border-box;
        }

        .vitrina-items.active {
            display: flex;
        }

        .vitrina-items::-webkit-scrollbar { height: 4px; }
        .vitrina-items::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* Botones del Clóset Neon */
        .item-opcion {
            width: 70px;
            height: 70px;
            background: rgba(30, 25, 50, 0.6);
            border: 1px solid rgba(191, 85, 236, 0.15);
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            box-sizing: border-box;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .item-opcion:hover {
            transform: scale(1.05);
            background: rgba(45, 35, 75, 0.8);
            border-color: var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
        }

        .item-opcion.seleccionado {
            background: rgba(191, 85, 236, 0.2);
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .item-opcion svg {
            width: 100%;
            height: 100%;
        }

        /* Botón de Reinicio Estilo Galaxia */
        .btn-reset {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(30, 25, 50, 0.7);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 15;
            font-size: 1.1rem;
            transition: all 0.2s;
        }
        .btn-reset:hover {
            border-color: var(--primary);
            box-shadow: 0 0 10px var(--primary-glow);
            background: rgba(45, 35, 75, 0.8);
        }
        .btn-reset:active { transform: scale(0.95); }
    </style>
</head>
<body>

            </svg>

            </svg>

        </div>

        <div class="closet-container">
            <div class="menu-pestanas">
                <button class="tab-btn active" onclick="cambiarPestana('sombreros', this)">👒 Gorros</button>
                <button class="tab-btn" onclick="cambiarPestana('ropa', this)">👕 Ropa</button>
                <button class="tab-btn" onclick="cambiarPestana('accesorios', this)">✨ Extras</button>
            </div>

            <div class="vitrina-items active" id="cat-sombreros">
                <div class="item-opcion" onclick="togglePrenda('rana', 'sombreros', this)">

                <div class="item-opcion" onclick="togglePrenda('corona', 'sombreros', this)">
                    <svg viewBox="0 0 60 40"><path d="M10 32l5-18 11 11 14-15 14 15 5-18 5 18H10z" fill="#facc15"/></svg>
                </div>
                <div class="item-opcion" onclick="togglePrenda('chef', 'sombreros', this)">

                <div class="item-opcion" onclick="togglePrenda('camisa', 'ropa', this)">

                    <svg viewBox="0 0 50 50"><rect x="10" y="10" width="30" height="30" rx="6" fill="#f97316"/></svg>
                </div>
                <div class="item-opcion" onclick="togglePrenda('sandia', 'accesorios', this)">
                    <svg viewBox="0 0 45 45"><path d="M6 16c0 14 12 22 16 22s16-8 16-22H6z" fill="#ef4444"/><path d="M4 16c0 16 14 25 18 25s18-9 18-25" stroke="#22c55e" stroke-width="3" fill="none"/></svg>
                </div>
            </div>
        </div>

    </div>

    <script>
        function cambiarPestana(idCat, botonActivo) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.vitrina-items').forEach(v => v.classList.remove('active'));
            
            botonActivo.classList.add('active');
            document.getElementById('cat-' + idCat).classList.add('active');
        }

        function togglePrenda(idPrenda, categoria, elementoBoton) {
            const capaOutfit = document.getElementById('layer-' + idPrenda);
            const esActiva = capaOutfit.classList.contains('active');

            if (categoria === 'ropa' || categoria === 'sombreros') {
                document.querySelectorAll('#cat-' + categoria + ' .item-opcion').forEach(b => b.classList.remove('seleccionado'));
                
                if(categoria === 'ropa') {
                    document.getElementById('layer-camisa').classList.remove('active');
                    document.getElementById('layer-pumas').classList.remove('active');
                    document.getElementById('layer-sueter').classList.remove('active');
                } else {
                    document.getElementById('layer-rana').classList.remove('active');
                    document.getElementById('layer-corona').classList.remove('active');
                    document.getElementById('layer-chef').classList.remove('active');
                }
            }

            if (esActiva) {
                capaOutfit.classList.remove('active');
                elementoBoton.classList.remove('seleccionado');
            } else {
                capaOutfit.classList.add('active');
                elementoBoton.classList.add('seleccionado');
            }
        }

        function reiniciarOutfit() {
            document.querySelectorAll('.outfit-layer').forEach(layer => layer.classList.remove('active'));
            document.querySelectorAll('.item-opcion').forEach(btn => btn.classList.remove('seleccionado'));
        }
    </script>
</body>
</html>
